services:
  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-splitwise}
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-4000}:3000"
    volumes:
      - ./backend/src:/app/src:delegated
      - ./backend/package.json:/app/package.json:delegated
    depends_on:
      database:
        condition: service_healthy

    command: npm start

  database:
    container_name: database
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_DB: ${POSTGRES_DB:-splitwise}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_DB:-splitwise},${POSTGRES_TEST_DB:-splitwise_test}
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    command: postgres -c shared_preload_libraries='' -c log_min_messages=warning
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-splitwise}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  tests:
    container_name: backend_tests
    profiles:
      - tests
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-splitwise_test}
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src:delegated
      - ./backend/package.json:/app/package.json:delegated
      - ./backend/tests:/app/tests:delegated
    depends_on:
      database:
        condition: service_healthy
    command: npx jest --watchAll --forceExit

volumes:
  postgres_data:
